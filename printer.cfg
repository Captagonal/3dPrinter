    ml75=PJ4, ml76=PJ5, ml77=PJ6, ml78=PE2, ml79=PE6,
    ml80=PE7, ml81=PD4, ml82=PD5, ml83=PD6, ml84=PH2,
    ml85=PH7

[gcode_macro START_PRINT]
# default_parameter_BED_TEMP: 60
# default_parameter_EXTRUDER_TEMP: 190
gcode:
        G90
        # set to absolute positioning
        M106 S0
        #set fan speed to zero (turned off)
        # set rest of gcodes in your slicer (ie. temperature for first layer)
        

[gcode_macro END_PRINT]
gcode:
        M104 S0
        # turn off temperature
        M140 S0
        # turn off heatbed
        M107
        # turn off fan
        M221 S100
        G91
        # set to relative positioning
        G90
        G1 Z+30 F3000
        # Move print head up
        G28 X0
        # move to the X-axis origin (Home)
        G1 E-2  F700
        # retract
        G0 Y280 F600
        #bring the bed to the front for easy print removal
        M84
        # disable motors
        BED_MESH_CLEAR

