# This file contains common pin mappings for RAMPS (v1.3 and later)
# boards. RAMPS boards typically use a firmware compiled for the AVR
# atmega2560 (though other AVR chips are also possible).

# See docs/Config_Reference.md for a description of parameters.
[printer]
kinematics: cartesian
max_velocity: 300 # might reduce to 150
max_accel: 3000 # might reduce to 1500
max_z_velocity: 10
max_z_accel: 100

## Reduces ringing and rippling due to vibrations in printer
## https://github.com/KevinOConnor/klipper/blob/master/docs/Resonance_Compensation.md
[input_shaper]
shaper_freq_x: 26.8
shaper_freq_y: 29.7


########################################
# TMC2208 configuration
########################################
## My config for TMC2208 - uncomment if using TMC2208 UART
## For Klipper, only ONE cable for UART is needed, and it goes to one pin
## In Marlin, two pins – RX and TX (with resistor). We use RX pin for one UART cable in Klipper
## Run current set according to https://wiki.fysetc.com/TMC2208/#calculator
## TMC2208 only for XY used

##########################

#[tmc2208 stepper_x]
#uart_pin: ar63
#microsteps: 16
#interpolate: True
#run_current: 0.700
#stealthchop_threshold: 100

[stepper_x]
step_pin: ar54
dir_pin: !ar55
enable_pin: !ar38
microsteps: 16
rotation_distance: 40
endstop_pin: !ar3
position_endstop: 1
position_min: 1
position_max: 295
homing_speed: 50

##########################

#[tmc2208 stepper_y]
#uart_pin: ar64
#microsteps: 16
#interpolate: True
#run_current: 0.860
#stealthchop_threshold: 100

[stepper_y]
step_pin: ar60
dir_pin: ar61
enable_pin: !ar56
microsteps: 16
rotation_distance: 40
endstop_pin: !ar14
position_endstop: 1
position_min: 1
position_max: 285
homing_speed: 50

##########################

[stepper_z]
step_pin: ar46
dir_pin: ar48
enable_pin: !ar62
microsteps: 16
rotation_distance: 4 ##Value 4 because of 800 mm/s steps for JGAurora A5
endstop_pin:  !ar18
position_min: 0 ## Because of BLTouch
position_max: 320
position_endstop: 0.0        # Set to 0.0 for mechanical endstop homing

##########################

[thermistor Trianglelab_T-D500]
### https://www.aliexpress.com/item/4000907614466.html
temperature1: 200
resistance1: 8000
beta: 5300

