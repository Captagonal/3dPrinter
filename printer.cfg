## pressure advance reduces blobs on corners and oozing of filaments. Calibrate value for each filament
## https://github.com/KevinOConnor/klipper/blob/master/docs/Pressure_Advance.md
## In your slicer in filaments settings use ie. SET_PRESSURE_ADVANCE ADVANCE=your_calibrated_value
## Ie. SET_PRESSURE_ADVANCE ADVANCE=0.827
## pressure_advance: 0.827 ## uncomment and use global value if you print just one filament


## Extruder temp sensor for original temp sensor
[extruder]
step_pin: ar26
dir_pin: !ar28 ## inverted because BMG Clone/Bondtech
enable_pin: !ar24
microsteps: 16
rotation_distance: 7.6248 ## 419.28 Steps for Bondtech
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ar10
sensor_type: EPCOS 100K B57560G104F
sensor_pin: analog13
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 10
max_temp: 260


##########################

[heater_bed]
heater_pin: ar8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: analog14
#control: watermark
min_temp: 0
max_temp: 120

##########################

[fan]
pin: ar9

